version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/repository/query/"
    schema: "./migrations"
    gen:
      go:
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_result_struct_pointers: true
        package: "repository"
        out: "./internal/repository/"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
